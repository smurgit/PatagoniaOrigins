<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosotros — Patagonia Origins Co.</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header" data-chrome="header"></header>

  <!-- Hero institucional -->
  <section class="about-hero">
    <div class="container">
      <p class="eyebrow" data-i18n="ab.eyebrow"></p>
      <h1 data-i18n="ab.title"></h1>
      <p data-i18n="home.impact.body"></p>
    </div>
  </section>

  <!-- Manifiesto -->
  <section class="section">
    <div class="container">
      <div class="manifesto">
        <p class="eyebrow" data-i18n="ab.manifesto.t"></p>
        <p data-i18n="ab.manifesto.b"></p>
      </div>
    </div>
  </section>

  <!-- Triple impacto con ejemplos concretos -->
  <section class="section impact">
    <div class="container">
      <div class="section-head">
        <p class="eyebrow" data-i18n="home.impact.eyebrow"></p>
        <h2 data-i18n="ab.impact.t"></h2>
      </div>
      <div class="impact-detail">
        <div class="row">
          <div><span class="ico">◔</span><h3 data-i18n="ab.eco.t"></h3></div>
          <p data-i18n="ab.eco.b"></p>
        </div>
        <div class="row">
          <div><span class="ico">❋</span><h3 data-i18n="ab.soc.t"></h3></div>
          <p data-i18n="ab.soc.b"></p>
        </div>
        <div class="row">
          <div><span class="ico">✦</span><h3 data-i18n="ab.env.t"></h3></div>
          <p data-i18n="ab.env.b"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Historia del proyecto -->
  <section class="section">
    <div class="container">
      <div class="story-block">
        <p class="eyebrow" data-i18n="ab.story.t"></p>
        <h2 data-i18n="ab.story.t"></h2>
        <p class="muted" style="font-size:1.05rem" data-i18n="ab.story.b"></p>
        <a class="btn" href="catalogo.html" style="margin-top:1rem" data-i18n="ab.cta"></a>
      </div>
    </div>
  </section>

  <footer class="site-footer" data-chrome="footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patagonia Origins Co. — Curaduría patagónica auténtica</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header" data-chrome="header"></header>

  <!-- Aviso: paleta/tipografía provisorias -->
  <div class="brand-note">
    <div class="container">
      <span>◭</span>
      <span data-i18n-html="_brandnote"></span>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="container hero-inner">
      <div class="hero-copy">
        <p class="eyebrow" data-i18n="home.hero.eyebrow"></p>
        <h1 data-i18n="home.hero.title"></h1>
        <p data-i18n="home.hero.body"></p>
        <div class="hero-cta">
          <a class="btn btn--light" href="catalogo.html" data-i18n="home.hero.cta"></a>
          <a class="btn btn--ghost" href="nosotros.html" style="color:var(--bone);border-color:rgba(255,255,255,.6)" data-i18n="home.hero.cta2"></a>
        </div>
      </div>
      <div class="hero-logo">
        <img src="img/logo-full-light.png" alt="Patagonia Origins Co.">
      </div>
    </div>
  </section>

  <!-- COLECCIONES CURADAS -->
  <section class="section">
    <div class="container">
      <div class="section-head">
        <p class="eyebrow" data-i18n="nav.shop"></p>
        <h2 id="coll-lead"></h2>
      </div>
      <div class="collections" id="collections"></div>
    </div>
  </section>

  <!-- TRIPLE IMPACTO -->
  <section class="section impact">
    <div class="container">
      <div class="section-head">
        <p class="eyebrow" data-i18n="home.impact.eyebrow"></p>
        <h2 data-i18n="home.impact.title"></h2>
        <p class="muted" data-i18n="home.impact.body"></p>
      </div>
      <div class="impact-cols">
        <div class="impact-card">
          <div class="ico">◔</div>
          <h4 data-i18n="home.impact.eco.t"></h4>
          <p data-i18n="home.impact.eco.b"></p>
        </div>
        <div class="impact-card">
          <div class="ico">❋</div>
          <h4 data-i18n="home.impact.soc.t"></h4>
          <p data-i18n="home.impact.soc.b"></p>
        </div>
        <div class="impact-card">
          <div class="ico">✦</div>
          <h4 data-i18n="home.impact.env.t"></h4>
          <p data-i18n="home.impact.env.b"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- NEWSLETTER -->
  <section class="section news">
    <div class="container">
      <h2 data-i18n="home.news.title"></h2>
      <p data-i18n="home.news.body"></p>
      <form class="news-form" onsubmit="return subscribeNews(event)">
        <input type="email" required data-i18n-ph="home.news.ph" aria-label="Email">
        <button class="btn btn--light" type="submit" data-i18n="home.news.cta"></button>
      </form>
      <div class="news-ok" id="news-ok"></div>
    </div>
  </section>

  <footer class="site-footer" data-chrome="footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Aviso de marca provisoria (bilingüe, inyectado por data-i18n-html)
    T["_brandnote"] = {
      es: "<b>Identidad de marca aplicada</b> — logo, paleta oficial y tipografía Glacial Indifference. Sólo las fotos de producto son de muestra (en el sitio final se usan fotos propias).",
      en: "<b>Brand identity applied</b> — logo, official palette and Glacial Indifference type. Only the product photos are placeholders (the final site uses your own)."
    };

    function subscribeNews(e) {
      e.preventDefault();
      document.getElementById("news-ok").textContent = t("home.news.ok");
      e.target.reset();
      return false;
    }

    window.renderPage = function () {
      // Lead de colecciones
      document.getElementById("coll-lead").textContent =
        State.lang === "es" ? "Tres formas de empezar a mirar" : "Three ways to start looking";

      // Render de colecciones curadas
      const wrap = document.getElementById("collections");
      wrap.innerHTML = COLLECTIONS.map(col => {
        const items = PRODUCTS.filter(p => p.collections.includes(col.id)).slice(0, 4);
        return `
          <div class="collection">
            <div class="collection-head">
              <div>
                <h3>${tf(col.title)}</h3>
                <p>${tf(col.subtitle)}</p>
              </div>
              <a class="collection-see" href="catalogo.html?collection=${col.id}">
                ${State.lang === "es" ? "Ver todo →" : "See all →"}
              </a>
            </div>
            <div class="product-grid">
              ${items.map(productCardHTML).join("")}
            </div>
          </div>`;
      }).join("");
    };
  </script>
</body>
</html>
